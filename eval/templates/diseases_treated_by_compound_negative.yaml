# Template: diseases_treated_by_compound_negative
# Type 08_negative_unanswerable. The queried edge does not exist: a real,
# recognizable compound that treats no disease in Hetionet. The ground-truth query
# is an ordinary Compound --treats--> Disease lookup that returns ZERO rows for this
# seed. Correct system behavior is to refuse / answer "none"; vector RAG is predicted
# to hallucinate a plausible disease from the compound's abstracts (H2). Scored
# binary: refused/none (correct) vs any asserted disease (hallucination).

id: diseases_treated_by_compound_negative
type: 08_negative_unanswerable
question: "Which diseases does {compound} treat?"

# Ground truth is graph traversal, expressed as SPARQL. Path is relative to this
# templates/ directory. For this template the query returns the empty set.
ground_truth: ground_truth/diseases_treated_by_compound_negative.rq

# New sampling mode `lacks_edge`: draw a compound that does NOT have the treats edge,
# so the answer is provably empty. The compound must still be a real, well-attested
# node (it has other edges, hence PubMed abstracts) — otherwise the negative is a
# trivial unknown-entity case rather than a tempting hallucination. The producer
# (step 3) should pair lacks_edge with a presence constraint on some other edge.
placeholders:
  compound:
    node_type: hetio:Compound
    sample: lacks_edge        # draw a compound with NO treats edge (empty answer)
    edge: hetio:treats        #   ...the absent edge under test
    presence_edge: hetio:causes  # but it MUST have side effects: a real, studied drug
    min_presence_fan: 10      #   ...with enough that it's a tempting hallucination, not a trivial unknown
    bind_var: compound        # the ?compound VALUES variable in the .rq
    label_into: compound      # the {compound} token in the question string

scoring: binary               # refused/"none" vs hallucinated a disease
answer_var: diseaseLabel      # the SELECT column; empty for this template
count: 7                      # instances to sample (type 08 target, eval/README.md)
