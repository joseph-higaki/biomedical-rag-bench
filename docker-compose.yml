services:
  graphdb:
    image: ontotext/graphdb:11.3.2
    container_name: biomedical-rag-graphdb
    ports:
      - "127.0.0.1:7200:7200"   # localhost-only; never bind 0.0.0.0 in dev
    volumes:
      - ./graphdb-data:/opt/graphdb/home   # persists repos across restarts
    secrets:
      - graphdb_license          # injected at /run/secrets/graphdb_license (see secrets/README.md)
    environment:
      - GDB_HEAP_SIZE=4G          # bump to 6-8G when reasoning is enabled in Project 2
      # GraphDB 11 Free needs a (free) Ontotext license at ./secrets/graphdb.license,
      # injected as the Docker secret below. Setup: secrets/README.md.
      - GDB_JAVA_OPTS=-Dgraphdb.license.file=/run/secrets/graphdb_license
    restart: unless-stopped
    healthcheck:
      # Probes the hetionet repo, not just liveness. A stale WSL bind mount leaves
      # GraphDB up but the repo unmounted (license lost -> restricted mode, or stale
      # graphdb-data) -> /repositories/hetionet/size returns 404. /protocol stays 200
      # in that state, so it would NOT catch the failure; the repo probe does.
      # Unhealthy here means "not eval-ready". start_period covers normal cold boot.
      test: ["CMD", "curl", "-fsS", "http://localhost:7200/repositories/hetionet/size"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

secrets:
  # File-based Compose secret: the gitignored per-dev license, mounted read-only at
  # /run/secrets/graphdb_license (replaces the old full-dir ./secrets bind).
  graphdb_license:
    file: ./secrets/graphdb.license
