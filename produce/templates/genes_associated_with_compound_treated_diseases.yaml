# Template: genes_associated_with_compound_treated_diseases
# Type 03_2hop_traversal. Two edges chained:
#   Compound --treats--> Disease --associates--> Gene.
# Answer is the set of genes associated with the diseases the compound treats;
# scored by set match against the gene labels the ground-truth query returns.

id: genes_associated_with_compound_treated_diseases
type: 03_2hop_traversal
question: "Which genes are associated with the diseases that {compound} treats?"

# Ground truth is graph traversal, expressed as SPARQL. Path is relative to this
# templates/ directory.
ground_truth: ground_truth/genes_associated_with_compound_treated_diseases.rq

# A placeholder binds one sampled entity with two faces: its label fills the
# {placeholder} in the question text, its URI is injected into a named VALUES
# variable in the query. These fields are read by the producer (build step 3);
# they are not exercised by the step-2 isolated smoke, which just runs the .rq
# with its committed example URI.
placeholders:
  compound:
    node_type: hetio:Compound
    sample: has_edge          # only draw compounds that actually have the first edge
    edge: hetio:treats        #   ...but note: a treated disease may have zero
                              #   associated genes, so first-edge presence does NOT
                              #   guarantee a non-empty 2-hop answer. Constrained vs
                              #   sample-then-filter is the step-3 sampling fork.
    bind_var: compound        # the ?compound VALUES variable in the .rq
    label_into: compound      # the {compound} token in the question string

scoring: set_match            # order-independent set comparison
answer_var: geneLabel         # which SELECT column carries the ground-truth answer
count: 7                      # instances to sample
min_answer: 2                 # 2-hop answer; the head `treats` fan can't bound it, so
max_answer: 25                #   the producer post-checks the actual .rq answer size
                              #   (also rejects empty answers: a treated disease may
                              #   associate zero genes)
